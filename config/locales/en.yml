# Files in the config/locales directory are used for internationalization
# and are automatically loaded by Rails. If you want to use locales other
# than English, add the necessary files in this directory.
#
# To use the locales, use `I18n.t`:
#
#     I18n.t 'hello'
#
# In views, this is aliased to just `t`:
#
#     <%= t('hello') %>
#
# To use a different locale, set it with `I18n.locale`:
#
#     I18n.locale = :es
#
# This would use the information in config/locales/es.yml.
#
# The following keys must be escaped otherwise they will not be retrieved by
# the default I18n backend:
#
# true, false, on, off, yes, no
#
# Instead, surround them with single quotes.
#
# en:
#   'true': 'foo'
#
# To learn more, please read the Rails Internationalization guide
# available at https://guides.rubyonrails.org/i18n.html.

en:
  hello: "Hello world"
  success: "Request processed successfully"
  unprocessed: "Request can not be processed"
  unauthorized: "You need to be authorized to access this resource"
  invalid: "The %{data} you provided is not valid"
  not_found: "Could not find the requested %{data}"
  expired_session: "Your session has expired"
  missing_header: "Your request was sent without an authorization header"
  server_error: "Something went wrong, please try again later"
  conflict: "A similar resource already exists"
  bad_request: "Please provide a valid data from the client"
  payment_required: "A payment is required to continue"
  onboarding:
    password_set: "Password has been set for this account"
    conflict: "Account already exists"